name: Deploy to galant.emer.co

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [webhook_deploy]
  workflow_dispatch:

concurrency:
  group: deploy-group
  cancel-in-progress: true

env:
  APP_NAME: "galant.emer.co"
  SSH_HOST: "185.135.91.50"
  SSH_PORT: "40022"
  SSH_USER: "serwer333502"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # 1. Instalacja Node.js
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' 
        cache: 'npm'       

    # 2. Autoryzacja SSH
    - name: Set up SSH Key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SERWER333502_AUTO_DEPLOY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -p ${{ env.SSH_PORT }} ${{ env.SSH_HOST }} >> ~/.ssh/known_hosts

   # 3. POBRANIE PLIKU Z LINKU (Z ulepszoną diagnostyką błędów)
    - name: Download Remote Data JSON
      run: |
        mkdir -p src/data
        # Flaga -f (fail) przerwie krok, jeśli serwer zwróci błąd HTTP (np. 404)
        # Usunięto -s, aby widzieć pasek postępu i ewentualny komunikat o błędzie sieci
        curl -fL "http://serwer38987.lh.pl/upload/${{ env.APP_NAME }}/data.json" -o "src/data/blog.json"
        
        echo "=== Sprawdzam, czy plik nie jest pusty i co zawiera ==="
        ls -la src/data/blog.json
        head -n 20 src/data/blog.json

    # 4. Instalacja paczek oraz budowanie aplikacji (export)
    - name: Install dependencies & Build
      run: |
        npm ci
        npm run build

    # 5. Sprawdzenie katalogu wynikowego (teraz foldery pl/en powinny tu być!)
    - name: Debug Build Output
      run: |
        echo "=== Zawartość folderu out po buildzie ==="
        ls -la ./out

    # 6. Wysyłka na serwer FTP
    - name: Clean & Deploy via Rsync
      run: |
        ssh -p ${{ env.SSH_PORT }} ${{ env.SSH_USER }}@${{ env.SSH_HOST }} "mkdir -p public_html/${{ env.APP_NAME }}"
        
        rsync -avzc --delete \
          -e "ssh -p ${{ env.SSH_PORT }}" \
          ./out/ ${{ env.SSH_USER }}@${{ env.SSH_HOST }}:public_html/${{ env.APP_NAME }}/