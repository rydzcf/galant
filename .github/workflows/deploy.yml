name: Deploy to galant.emer.co

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [webhook_deploy]
  workflow_dispatch:

concurrency:
  group: deploy-group
  cancel-in-progress: true

env:
  APP_NAME: "galant.emer.co"
  SSH_HOST: "185.135.91.50"
  SSH_PORT: "40022"
  SSH_USER: "serwer333502"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # 1. Instalacja Node.js
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' 
        cache: 'npm'       

    # 2. Autoryzacja SSH
    - name: Set up SSH Key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SERWER333502_AUTO_DEPLOY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -p ${{ env.SSH_PORT }} ${{ env.SSH_HOST }} >> ~/.ssh/known_hosts

  # 3. POBRANIE PLIKU Z LINKU oraz ZDJĘĆ Z JSON-A
    - name: Download Remote Data JSON and Images
      run: |
        # 1. Tworzenie potrzebnych katalogów
        mkdir -p src/data
        mkdir -p public/images/blog
        
        # 2. Pobranie głównego pliku JSON
        curl -fL "http://serwer38987.lh.pl/upload/${{ env.APP_NAME }}/data.json" -o "src/data/blog.json"
        
        echo "=== Sprawdzam, czy plik JSON został poprawnie zapisany ==="
        ls -la src/data/

        # 3. Parsowanie JSON-a i pobieranie zdjęć
        echo "=== Rozpoczynam pobieranie zdjęć z serwera zewnętrznego ==="
        
        # Używamy jq do wyciągnięcia zawartości pól "image" z każdego obiektu w tablicy
        jq -r '.[].image' src/data/blog.json | while read -r img_url; do
          # Pomijamy puste linie, jeśli jakieś się trafią
          [ -z "$img_url" ] && continue
          
          # Wyciągamy samą nazwę pliku z adresu URL (np. "1783515797510-86673153.jpg")
          img_name=$(basename "$img_url")
          
          echo "Pobieram: $img_name z adresu $img_url"
          
          # Pobieramy zdjęcie bezpośrednio pod pełnym adresem url
          curl -s -fL "$img_url" -o "public/images/blog/$img_name" || echo "BŁĄD: Nie udało się pobrać: $img_name"
        done

        echo "=== Zawartość folderu ze zdjęciami bloga po pobraniu ==="
        ls -la public/images/blog/

    # 4. Instalacja paczek oraz budowanie aplikacji (export)
    - name: Install dependencies & Build
      run: |
        npm ci
        npm run build

    # 5. Sprawdzenie katalogu wynikowego (teraz foldery pl/en powinny tu być!)
    - name: Debug Build Output
      run: |
        echo "=== Zawartość folderu out po buildzie ==="
        ls -la ./out

   # 6. Wysyłka na serwer FTP (Z wykluczeniem .htaccess)
    - name: Clean & Deploy via Rsync
      run: |
        ssh -p ${{ env.SSH_PORT }} ${{ env.SSH_USER }}@${{ env.SSH_HOST }} "mkdir -p public_html/${{ env.APP_NAME }}"
        
        rsync -avzc --delete --exclude='.htaccess' \
          -e "ssh -p ${{ env.SSH_PORT }}" \
          ./out/ ${{ env.SSH_USER }}@${{ env.SSH_HOST }}:public_html/${{ env.APP_NAME }}/