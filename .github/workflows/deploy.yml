name: Deploy to medycynapersonalna.pl

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [webhook_deploy]
  workflow_dispatch:

concurrency:
  group: deploy-group
  cancel-in-progress: true

env:
  APP_NAME: "medycynapersonalna.pl"
  SSH_HOST: "185.135.91.50"
  SSH_PORT: "40022"
  SSH_USER: "serwer333502"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # 1. Instalacja Node.js
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' 
        cache: 'npm'       

    # 2. Autoryzacja SSH
    - name: Set up SSH Key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SERWER333502_AUTO_DEPLOY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -p ${{ env.SSH_PORT }} ${{ env.SSH_HOST }} >> ~/.ssh/known_hosts

  # 3. POBRANIE PLIKU Z LINKU (Sam JSON)
    - name: Download Remote Data JSON
      run: |
        mkdir -p src/data
        curl -fL "http://serwer38987.lh.pl/upload/${{ env.APP_NAME }}/data.json" -o "src/data/blog.json"
        
        echo "=== Sprawdzam, czy plik został poprawnie zapisany ==="
        ls -la src/data/

    # 4. Instalacja paczek oraz budowanie aplikacji (export)
    - name: Install dependencies & Build
      run: |
        npm ci
        npm run build

    # 5. Sprawdzenie katalogu wynikowego (teraz foldery pl/en powinny tu być!)
    - name: Debug Build Output
      run: |
        echo "=== Zawartość folderu out po buildzie ==="
        ls -la ./out

   # 6. Wysyłka na serwer i pobranie zdjęć BEZPOŚREDNIO na serwerze docelowym
    - name: Clean & Deploy via Rsync and Fetch Images
      run: |
        # 1. Tworzymy strukturę folderów na serwerze docelowym, jeśli jeszcze nie istnieje
        ssh -p ${{ env.SSH_PORT }} ${{ env.SSH_USER }}@${{ env.SSH_HOST }} "mkdir -p public_html/${{ env.APP_NAME }}/images/blog"
        
        # 2. Wysyłamy zbudowaną aplikację z folderu ./out
        # Używamy --exclude='images/blog', aby kolejne wdrożenia NIE kasowały już pobranych zdjęć na serwerze
        rsync -avzc --delete --exclude='.htaccess' --exclude='images/blog' \
          -e "ssh -p ${{ env.SSH_PORT }}" \
          ./out/ ${{ env.SSH_USER }}@${{ env.SSH_HOST }}:public_html/${{ env.APP_NAME }}/
        
        # 3. Wykonanie skryptu pobierania zdjęć bezpośrednio z poziomu Twojego serwera docelowego
        echo "=== Uruchamiam pobieranie zdjęć bezpośrednio na serwerze docelowym ==="
        
        ssh -p ${{ env.SSH_PORT }} ${{ env.SSH_USER }}@${{ env.SSH_HOST }} TARGET_APP="${{ env.APP_NAME }}" 'bash -s' << 'EOF'
          # Wchodzimy do katalogu projektu na serwerze
          cd public_html/"$TARGET_APP"
          
          echo "Przeszukuję pliki HTML w poszukiwaniu zdjęć..."
          
          # Szukamy nazw plików graficznych we wszystkich wygenerowanych plikach HTML (również w podfolderach językowych /pl /en)
          find . -name "*.html" -exec grep -oE '[a-zA-Z0-9_-]+\.(jpg|jpeg|png|webp|gif)' {} + | cut -d: -f2 | sort -u | while read -r img_name; do
            
            # Sprawdzamy, czy plik już istnieje lokalnie na serwerze, aby nie pobierać go niepotrzebnie ponownie
            if [ ! -f "images/blog/$img_name" ]; then
              echo "Serwer pobiera nowe zdjęcie: $img_name"
              curl -s -fL "http://serwer38987.lh.pl/upload/$TARGET_APP/img/$img_name" -o "images/blog/$img_name" || echo "BŁĄD: Nie udało się pobrać: $img_name"
            else
              echo "Zdjęcie już istnieje, pomijam: $img_name"
            fi
            
          done
          
          echo "=== Aktualna zawartość folderu ze zdjęciami na serwerze ==="
          ls -la images/blog/
        EOF