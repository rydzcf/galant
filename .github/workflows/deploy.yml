name: Deploy to galant.emer.co

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [webhook_deploy]
  workflow_dispatch:

concurrency:
  group: deploy-group
  cancel-in-progress: true

env:
  APP_NAME: "galant.emer.co"
  SSH_HOST: "185.135.91.50"
  SSH_PORT: "40022"
  SSH_USER: "serwer333502"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # 1. Instalacja Node.js w środowisku GitHub Actions
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # w razie potrzeby zmień na wersję, której używasz lokalnie
        cache: 'npm'       # automatyczny cache przyspieszy kolejne wdrożenia

    - name: Set up SSH Key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SERWER333502_AUTO_DEPLOY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -p ${{ env.SSH_PORT }} ${{ env.SSH_HOST }} >> ~/.ssh/known_hosts

    # 2. Pobranie danych (muszą być na miejscu przed uruchomieniem buildu)
    - name: Download Remote Data JSON
      run: |
        mkdir -p app/data
        curl -sL "http://serwer38987.lh.pl/upload/${{ env.APP_NAME }}/data.json" -o "app/data/data.json"

    # 3. Instalacja paczek oraz budowanie aplikacji (export)
    - name: Install dependencies & Build
      run: |
        npm ci
        npm run build

    # 4. Wysyłka SAMYCH gotowych plików statycznych na serwer
    - name: Clean & Deploy via Rsync
      run: |
        # Upewniamy się, że folder docelowy na serwerze istnieje
        ssh -p ${{ env.SSH_PORT }} ${{ env.SSH_USER }}@${{ env.SSH_HOST }} "mkdir -p public_html/${{ env.APP_NAME }}"
        
        # Poprawione: Przesyłamy tylko zawartość folderu ./out/ (lub ./dist/ jeśli to Vite/Nuxt)
        # Ważny jest ukośnik na końcu "out/", aby wgrać zawartość folderu, a nie sam folder
        rsync -avzc --delete \
          -e "ssh -p ${{ env.SSH_PORT }}" \
          ./out/ ${{ env.SSH_USER }}@${{ env.SSH_HOST }}:public_html/${{ env.APP_NAME }}/