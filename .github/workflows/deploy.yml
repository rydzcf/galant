name: Deploy to galant.emer.co

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [webhook_deploy]
  workflow_dispatch:

concurrency:
  group: deploy-group
  cancel-in-progress: true

env:
  APP_NAME: "galant.emer.co"
  SSH_HOST: "185.135.91.50"
  SSH_PORT: "40022"
  SSH_USER: "serwer333502"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # 1. Instalacja Node.js
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' 
        cache: 'npm'       

    # 2. Autoryzacja SSH
    - name: Set up SSH Key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SERWER333502_AUTO_DEPLOY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -p ${{ env.SSH_PORT }} ${{ env.SSH_HOST }} >> ~/.ssh/known_hosts

  # 3. POBRANIE PLIKU Z LINKU (Sam JSON)
    - name: Download Remote Data JSON
      run: |
        mkdir -p src/data
        curl -fL "http://serwer38987.lh.pl/upload/${{ env.APP_NAME }}/data.json" -o "src/data/blog.json"
        
        echo "=== Sprawdzam, czy plik został poprawnie zapisany ==="
        ls -la src/data/

    # 4. Instalacja paczek oraz budowanie aplikacji (export)
    - name: Install dependencies & Build
      run: |
        npm ci
        npm run build

    # 5. Sprawdzenie katalogu wynikowego (teraz foldery pl/en powinny tu być!)
    - name: Debug Build Output
      run: |
        echo "=== Zawartość folderu out po buildzie ==="
        ls -la ./out

   # 6. Wysyłka na serwer i pobranie zdjęć BEZPOŚREDNIO na serwerze docelowym
    - name: Clean & Deploy via Rsync and Fetch Images
      run: |
        # 1. Tworzymy strukturę folderów na serwerze docelowym (z uwzględnieniem images/blog)
        ssh -p ${{ env.SSH_PORT }} ${{ env.SSH_USER }}@${{ env.SSH_HOST }} "mkdir -p public_html/${{ env.APP_NAME }}/images/blog"
        
        # 2. Wysyłamy zbudowaną aplikację z folderu ./out
        # Używamy --exclude='images/blog', aby rsync NIE kasował pobranych tam wcześniej zdjęć
        rsync -avzc --delete --exclude='.htaccess' --exclude='images/blog' \
          -e "ssh -p ${{ env.SSH_PORT }}" \
          ./out/ ${{ env.SSH_USER }}@${{ env.SSH_HOST }}:public_html/${{ env.APP_NAME }}/
        
        # 3. Wykonanie skryptu synchronizacji zdjęć (Mirror) bezpośrednio na serwerze docelowym
        echo "=== Uruchamiam synchronizację folderu zdjęć na serwerze docelowym ==="
        
        ssh -p ${{ env.SSH_PORT }} ${{ env.SSH_USER }}@${{ env.SSH_HOST }} TARGET_APP="${{ env.APP_NAME }}" 'bash -s' << 'EOF'
          cd public_html/"$TARGET_APP"
          
          # Tworzymy folder na zdjęcia, jeśli go nie ma, oraz plik tymczasowy na listę
          mkdir -p images/blog
          TMP_LIST=$(mktemp)
          
          echo "Pobieram aktualną listę plików z serwera źródłowego..."
          # Pobieramy indeks strony HTTP i wyciągamy z niego nazwy plików obrazków
          curl -s "http://serwer38987.lh.pl/upload/$TARGET_APP/img/" | grep -oE '[a-zA-Z0-9_-]+\.(jpg|jpeg|png|webp|gif)' | sort -u > "$TMP_LIST"
          
          # POBIERANIE: Jeśli pliku ze źródła nie ma w images/blog -> pobierz go
          while read -r img_name; do
            if [ ! -f "images/blog/$img_name" ]; then
              echo "Wykryto brakujący plik. Pobieram: $img_name"
              curl -s -fL "http://serwer38987.lh.pl/upload/$TARGET_APP/img/$img_name" -o "images/blog/$img_name"
            fi
          done < "$TMP_LIST"
          
          # KASOWANIE: Jeśli plik istnieje w images/blog, ale NIE MA go na liście źródłowej -> skasuj
          echo "Sprawdzam, czy w images/blog są nadmiarowe pliki do usunięcia..."
          find images/blog -type f | while read -r local_file; do
            local_name=$(basename "$local_file")
            
            # Jeśli nazwy nie ma w pliku tymczasowym z listą źródłową -> usuwamy (jak --delete w rsync)
            if ! grep -qx "$local_name" "$TMP_LIST"; then
              echo "Wykryto nadmiarowy plik. Usuwam: $local_name"
              rm "$local_file"
            fi
          done
          
          # Czyszczenie pliku tymczasowego
          rm "$TMP_LIST"
          
          echo "=== Synchronizacja zakończona sukcesem ==="
          ls -la images/blog/
        EOF