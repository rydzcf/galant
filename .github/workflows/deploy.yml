name: Deploy to galant.emer.co

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [webhook_deploy]
  workflow_dispatch:

concurrency:
  group: deploy-group
  cancel-in-progress: true

env:
  APP_NAME: "galant.emer.co"
  SSH_HOST: "185.135.91.50"
  SSH_PORT: "40022"
  SSH_USER: "serwer333502"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # 1. Instalacja Node.js
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' 
        cache: 'npm'       

    # 2. Autoryzacja SSH
    - name: Set up SSH Key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SERWER333502_AUTO_DEPLOY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -p ${{ env.SSH_PORT }} ${{ env.SSH_HOST }} >> ~/.ssh/known_hosts

    # 3. POBRANIE PLIKU Z LINKU (Wykonuje się NAJPIERW)
    # Tworzy folder (jeśli nie istnieje) i pobiera najnowszy JSON nadpisując stary
    - name: Download Remote Data JSON
      run: |
        mkdir -p app/data
        curl -sL "http://serwer38987.lh.pl/upload/${{ env.APP_NAME }}/data.json" -o "app/data/data.json"

    # 4. BUDOWANIE APLIKACJI (Wykonuje się POTEM)
    # Next.js użyje dokładnie tego pliku, który pobrał curl sekundę wcześniej
    - name: Install dependencies & Build
      run: |
        npm ci
        npm run build

    # 5. DIAGNOSTYKA
    # Sprawdzamy w logach GitHub Actions, czy Next.js stworzył foldery pl/en
    - name: Debug Build Output
      run: |
        echo "=== Zawartość folderu out po buildzie ==="
        if [ -d "./out" ]; then
          ls -la ./out
        else
          echo "BŁĄD: Folder ./out nie istnieje!"
          ls -la
        fi

    # 6. WYSYŁKA NA SERWER (Bez problematycznej flagi)
    - name: Clean & Deploy via Rsync
      run: |
        ssh -p ${{ env.SSH_PORT }} ${{ env.SSH_USER }}@${{ env.SSH_HOST }} "mkdir -p public_html/${{ env.APP_NAME }}"
        
        rsync -avzc --delete \
          -e "ssh -p ${{ env.SSH_PORT }}" \
          ./out/ ${{ env.SSH_USER }}@${{ env.SSH_HOST }}:public_html/${{ env.APP_NAME }}/