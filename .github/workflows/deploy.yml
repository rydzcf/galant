name: Deploy to galant.emer.co

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [webhook_deploy]
  workflow_dispatch:

concurrency:
  group: deploy-group
  cancel-in-progress: true

env:
  APP_NAME: "galant.emer.co"
  SSH_HOST: "185.135.91.50"
  SSH_PORT: "40022"
  SSH_USER: "serwer333502"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # 1. Instalacja Node.js w środowisku GitHub Actions
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' 
        cache: 'npm'       

    - name: Set up SSH Key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SERWER333502_AUTO_DEPLOY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -p ${{ env.SSH_PORT }} ${{ env.SSH_HOST }} >> ~/.ssh/known_hosts

    # 2. Instalacja paczek oraz budowanie aplikacji (export)
    # [ZMIANA]: Usunięto curl. Next.js użyje pliku app/data/data.json z Twojego repozytorium.
    - name: Install dependencies & Build
      run: |
        npm ci
        npm run build

    # KROK DIAGNOSTYCZNY: Sprawdzamy czy foldery pl/en na pewno się wygenerowały
    - name: Debug Build Output
      run: |
        echo "=== Zawartość folderu out po buildzie ==="
        if [ -d "./out" ]; then
          ls -la ./out
        else
          echo "BŁĄD: Folder ./out nie istnieje!"
          ls -la
        fi

   # 3. Wysyłka SAMYCH gotowych plików statycznych na serwer
    - name: Clean & Deploy via Rsync
      run: |
        # Upewniamy się, że folder docelowy na serwerze istnieje
        ssh -p ${{ env.SSH_PORT }} ${{ env.SSH_USER }}@${{ env.SSH_HOST }} "mkdir -p public_html/${{ env.APP_NAME }}"
        
        # Usunięto flagę --no-vcs-ignores, która powodowała błąd bazy rsync
        rsync -avzc --delete \
          -e "ssh -p ${{ env.SSH_PORT }}" \
          ./out/ ${{ env.SSH_USER }}@${{ env.SSH_HOST }}:public_html/${{ env.APP_NAME }}/