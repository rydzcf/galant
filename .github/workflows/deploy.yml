name: Deploy to galant.emer.co

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [webhook_deploy]
  workflow_dispatch:

concurrency:
  group: deploy-group
  cancel-in-progress: true

env:
  APP_NAME: "galant.emer.co"
  SSH_HOST: "185.135.91.50"
  SSH_PORT: "40022"
  SSH_USER: "serwer333502"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up SSH Key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SERWER333502_AUTO_DEPLOY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -p ${{ env.SSH_PORT }} ${{ env.SSH_HOST }} >> ~/.ssh/known_hosts

    - name: Download Remote Data JSON
      run: |
        mkdir -p app/data
        curl -sL "http://serwer38987.lh.pl/upload/${{ env.APP_NAME }}/data.json" -o "app/data/data.json"

    - name: Clean & Deploy via Rsync
      run: |
        # Upewniamy się, że folder docelowy na serwerze istnieje (ścieżka składana ze zmiennej APP_NAME)
        ssh -p ${{ env.SSH_PORT }} ${{ env.SSH_USER }}@${{ env.SSH_HOST }} "mkdir -p public_html/${{ env.APP_NAME }}"
        
        # Rsync z dynamiczną ścieżką i poprawioną końcówką (wprost do folderu domeny)
        rsync -avzc --delete \
          -e "ssh -p ${{ env.SSH_PORT }}" \
          ./ ${{ env.SSH_USER }}@${{ env.SSH_HOST }}:public_html/${{ env.APP_NAME }}/